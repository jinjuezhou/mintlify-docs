openapi: 3.0.3
info:
  title: Face Swap API
  description: API for face swapping in images and videos
  version: 1.0.0
servers:
  - url: https://openapi.akool.com
    description: Production server
security:
  - ApiKeyAuth: []
  - BearerAuth: []

paths:
  /api/open/v3/faceswap/highquality/specifyimage:
    post:
      summary: Image Faceswap
      description: Swap faces in images with high quality
      tags:
        - Face Swap
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageFaceswapRequest'
            example:
              targetImage:
                - path: "https://d21ksh0k4smeql.cloudfront.net/crop_1694593694387-4562-0-1694593694575-0526.png"
                  opts: "262,175:363,175:313,215:272,279"
              sourceImage:
                - path: "https://d21ksh0k4smeql.cloudfront.net/crop_1705462509874-9254-0-1705462510015-9261.png"
                  opts: "239,364:386,366:317,472:266,539"
              face_enhance: 0
              modifyImage: "https://d21ksh0k4smeql.cloudfront.net/bdd1c994c4cd7a58926088ae8a479168-1705462506461-1966.jpeg"
              webhookUrl: ""
      responses:
        '200':
          description: Faceswap request submitted successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/FaceswapResult'
              example:
                code: 1000
                msg: "Please be patient! If your results are not generated in three hours, please check your input image."
                data:
                  _id: "6593c94c0ef703e8c055e3c8"
                  url: "https://***.cloudfront.net/final_71688047459_.pic-1704184129269-4947-f8abc658-fa82-420f-b1b3-c747d7f18e14-8535.jpg"
                  job_id: "20240102082900592-5653"

  /api/open/v4/faceswap/faceswapByImage:
    post:
      summary: Face Swap Pro
      description: |
        Face Swap Pro API (`akool_faceswap_image_hq`) - Highest quality face swap for images.

        - More realistic, more similar results
        - Simplified integration: `opts` parameter is optional when both arrays have 1 element
        - Supports up to 50 sourceImage / targetImage pairs
        - **Validation Rules**:
          - Each `path` must be a valid HTTP/HTTPS URL
          - `opts` is **required** when either array has more than 1 element
          - `opts` is **optional** when both arrays have exactly 1 element each
      tags:
        - Face Swap
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageFaceswapProRequest'
            example:
              sourceImage:
                - path: "https://example.com/new-face.jpg"
              targetImage:
                - path: "https://example.com/original.jpg"
              model_name: "akool_faceswap_image_hq"
              face_enhance: false
      responses:
        '200':
          description: Faceswap request submitted successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/FaceswapV4Result'
              example:
                code: 1000
                msg: "OK"
                data:
                  _id: "6593c94c0ef703e8c055e3c8"
                  job_id: "20240102082900592-5653"

  /api/open/v4/faceswap/faceswapPlusByImage:
    post:
      summary: Face Swap Plus
      description: |
        Face Swap Plus API (`akool_faceswap_classic_plus`) - Multi-face swap for images and videos.

        - Supports **multiple faces** via `face_mapping`
        - Supports both **images and videos** (`source_url` / `target_url`)
        - Supports `single_face_mode` for single-face swap
        - Supports `model_style` (realistic / beautify / lossless)
      tags:
        - Face Swap
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageFaceswapPlusRequest'
            examples:
              multi_face:
                summary: "Multi-Face Swap"
                value:
                  source_url: "https://example.com/new-face.jpg"
                  target_url: "https://example.com/group-photo.jpg"
                  face_enhance: false
                  model_style: "realistic"
                  single_face_mode: false
                  face_mapping:
                    - source_face_info:
                        face_url: "https://example.com/source-face-1.jpg"
                      target_face_info:
                        face_url: "https://example.com/target-face-1.jpg"
                    - source_face_info:
                        face_url: "https://example.com/source-face-2.jpg"
                      target_face_info:
                        face_url: "https://example.com/target-face-2.jpg"
              video_segment:
                summary: "Video Single Face Swap"
                value:
                  source_url: "https://example.com/new-face.jpg"
                  target_url: "https://example.com/video.mp4"
                  single_face_mode: true
                  face_enhance: false
      responses:
        '200':
          description: Faceswap request submitted successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/FaceswapV4Result'
              example:
                code: 1000
                msg: "OK"
                data:
                  _id: "6593c94c0ef703e8c055e3c8"
                  job_id: "20240102082900592-5653"

  /api/open/v3/faceswap/highquality/specifyvideo:
    post:
      summary: Video Faceswap
      description: Swap faces in videos with high quality
      tags:
        - Face Swap
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VideoFaceswapRequest'
            example:
              sourceImage:
                - path: "https://d21ksh0k4smeql.cloudfront.net/crop_1705475757658-3362-0-1705475757797-3713.png"
                  opts: "239,364:386,366:317,472:266,539"
              targetImage:
                - path: "https://d21ksh0k4smeql.cloudfront.net/crop_1705479323786-0321-0-1705479323896-7695.png"
                  opts: "176,259:243,259:209,303:183,328"
              face_enhance: 0
              modifyVideo: "https://d21ksh0k4smeql.cloudfront.net/avatar_01-1705479314627-0092.mp4"
              webhookUrl: ""
      responses:
        '200':
          description: Video faceswap request submitted successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/FaceswapResult'

  /api/open/v3/faceswap/result/listbyids:
    get:
      summary: Get Faceswap Result List
      description: Get faceswap results by IDs
      tags:
        - Face Swap
      parameters:
        - name: _ids
          in: query
          required: true
          schema:
            type: string
          description: Result IDs are strings separated by commas
      responses:
        '200':
          description: List of faceswap results
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/FaceswapResultList'

  /api/open/v3/faceswap/quota/info:
    get:
      summary: Get User Credit Info
      description: Get faceswap user credit information
      tags:
        - Face Swap
      responses:
        '200':
          description: User credit information
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CreditInfo'

  /api/open/v3/faceswap/result/delbyids:
    post:
      summary: Delete Faceswap Results
      description: Delete faceswap results by IDs
      tags:
        - Face Swap
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - _ids
              properties:
                _ids:
                  type: string
                  description: Result IDs are strings separated by commas
            example:
              _ids: "64ef2f27b33f466877701c6a,64ef2f27b33f466877701c6b"
      responses:
        '200':
          description: Results deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: Your API Key used for request authorization. If both Authorization and x-api-key have values, Authorization will be used first and x-api-key will be discarded.
    BearerAuth:
      type: http
      scheme: bearer
      description: Your API Key used for request authorization. Get Token from authentication/usage#get-the-token

  schemas:
    ApiResponse:
      type: object
      required:
        - code
        - msg
      properties:
        code:
          type: integer
          description: "Interface returns business status code (1000: success)"
          example: 1000
        msg:
          type: string
          description: Interface returns status information
          example: "OK"

    FaceImageWithOpts:
      type: object
      required:
        - path
      properties:
        path:
          type: string
          format: uri
          description: |
            Valid URL of the face image. Must be a valid HTTP/HTTPS URL.
            Invalid URLs will be rejected during validation.
        opts:
          type: string
          description: |
            Face landmark coordinates string (conditional requirement).
            You can get this value from the `crop_landmarks` field returned by the [Face Detection API](/ai-tools-suite/face-detection/detect-faces).
            
            **Required** when `sourceImage` or `targetImage` array length > 1.
            **Optional** when both `sourceImage` and `targetImage` arrays have exactly 1 element each.
            
            When provided, improves face alignment accuracy.
            Format: colon-separated coordinate pairs, e.g. "262,175:363,175:313,215:272,279"

    FaceImageSimple:
      type: object
      required:
        - path
      properties:
        path:
          type: string
          description: Links to face image

    ImageFaceswapRequest:
      type: object
      required:
        - targetImage
        - sourceImage
        - modifyImage
      properties:
        targetImage:
          type: array
          items:
            $ref: '#/components/schemas/FaceImageWithOpts'
          description: A collection of faces in the original image
        sourceImage:
          type: array
          items:
            $ref: '#/components/schemas/FaceImageWithOpts'
          description: Replacement target image information
        face_enhance:
          type: integer
          enum: [0, 1]
          default: 0
          description: Whether facial enhancement (1 means open, 0 means close)
        modifyImage:
          type: string
          description: Modify the link address of the image
        webhookUrl:
          type: string
          description: Callback url address based on HTTP request

    FaceMappingItem:
      type: object
      required:
        - source_face_info
        - target_face_info
      properties:
        source_face_info:
          type: object
          required:
            - face_url
          properties:
            face_url:
              type: string
              description: |
                URL of the source (new) face image.
                Can be a `face_urls` value from the Face Detection API (bbox not needed),
                or a user-uploaded original image URL (bbox required).
            bbox:
              type: array
              items:
                type: number
              minItems: 4
              maxItems: 4
              description: |
                Bounding box `[x1, y1, x2, y2]` for the source face (optional).
                Required when `face_url` is a user-uploaded original image URL.
                Get this value from the `crop_region` field of the Face Detection API response.
                Not needed when `face_url` comes from `face_urls` in the Face Detection API response.
        target_face_info:
          type: object
          properties:
            face_url:
              type: string
              description: |
                URL of the target (original) face image.
                Can be a `face_urls` value from the Face Detection API (bbox not needed),
                or a user-uploaded original image URL (bbox required).
            bbox:
              type: array
              items:
                type: number
              minItems: 4
              maxItems: 4
              description: |
                Bounding box `[x1, y1, x2, y2]` for the target face (optional).
                Required when `face_url` is a user-uploaded original image URL.
                Get this value from the `crop_region` field of the Face Detection API response.
                Not needed when `face_url` comes from `face_urls` in the Face Detection API response.

    TimeRange:
      type: object
      required:
        - start
        - end
      properties:
        start:
          type: number
          minimum: 0
          description: Start time in seconds
        end:
          type: number
          minimum: 0
          description: End time in seconds (must be greater than start)

    ImageFaceswapProRequest:
      type: object
      required:
        - sourceImage
        - targetImage
      properties:
        sourceImage:
          type: array
          items:
            $ref: '#/components/schemas/FaceImageWithOpts'
          minItems: 1
          maxItems: 50
          description: |
            Source (new) face image URL array. Each item contains `path` (required, must be valid URL) and `opts` (conditional).
            
            **`opts` requirement**:
            - **Required** when `sourceImage` or `targetImage` array length > 1 (all elements must have `opts`)
            - **Optional** when both `sourceImage` and `targetImage` arrays have exactly 1 element each
            
            The `opts` value comes from the `crop_landmarks` field returned by the [Face Detection API](/ai-tools-suite/face-detection/detect-faces).
        targetImage:
          type: array
          items:
            $ref: '#/components/schemas/FaceImageWithOpts'
          minItems: 1
          maxItems: 50
          description: |
            Target face image URL array. Each item contains `path` (required, must be valid URL) and `opts` (conditional).
            
            **`opts` requirement**:
            - **Required** when `sourceImage` or `targetImage` array length > 1 (all elements must have `opts`)
            - **Optional** when both `sourceImage` and `targetImage` arrays have exactly 1 element each
            
            The `opts` value comes from the `crop_landmarks` field returned by the [Face Detection API](/ai-tools-suite/face-detection/detect-faces).
        model_name:
          type: string
          enum:
            - akool_faceswap_image_hq
          default: akool_faceswap_image_hq
          description: "Model name (default: `akool_faceswap_image_hq`)"
        webhookUrl:
          type: string
          description: Callback URL for result notification
        face_enhance:
          type: boolean
          default: false
          description: Whether to enable face enhancement (default false)
        single_face_mode:
          type: boolean
          default: false
          description: |
            When `true`, enables single face mode for simplified single-face swap.
            When `false` (default), standard mode.

    ImageFaceswapPlusRequest:
      type: object
      required:
        - source_url
        - target_url
      properties:
        source_url:
          type: string
          description: Source (new) face image URL
        target_url:
          type: string
          description: Target material URL (image or video)
        webhookUrl:
          type: string
          description: Callback URL for result notification
        face_enhance:
          type: boolean
          default: false
          description: Whether to enable face enhancement (default false)
        model_style:
          type: string
          enum:
            - realistic
            - beautify
            - lossless
          default: realistic
          description: "Model style: `realistic` (default), `beautify`, or `lossless`"
        face_mapping:
          type: array
          items:
            $ref: '#/components/schemas/FaceMappingItem'
          description: |
            Face mapping array for multi-face swap (required when `single_face_mode` is false).
            Each item maps one source face to one target face.
        single_face_mode:
          type: boolean
          default: false
          description: |
            When `true`, enables single-face mode for simplified single-face swap.
            When `false` (default), uses `face_mapping` for multi-face swap.

    VideoFaceswapRequest:
      type: object
      required:
        - targetImage
        - sourceImage
        - modifyVideo
      properties:
        sourceImage:
          type: array
          items:
            $ref: '#/components/schemas/FaceImageWithOpts'
          description: Replacement target image information. You need to change it to the link collection of the face you need.
        targetImage:
          type: array
          items:
            $ref: '#/components/schemas/FaceImageWithOpts'
          description: A collection of faces in the original video. Represents the collection of faces after face detection using modifyVideo.
        face_enhance:
          type: integer
          enum: [0, 1]
          default: 0
          description: Whether facial enhancement (1 means open, 0 means close)
        modifyVideo:
          type: string
          description: The original video you need to change the face
        webhookUrl:
          type: string
          description: Callback url address based on HTTP request

    FaceswapResult:
      type: object
      properties:
        _id:
          type: string
          description: Interface returns data ID
        url:
          type: string
          description: Faceswap result URL
        job_id:
          type: string
          description: Task processing unique ID

    FaceswapV4Result:
      type: object
      properties:
        _id:
          type: string
          description: Interface returns data ID
        job_id:
          type: string
          description: Task processing unique ID

    FaceswapResultDetail:
      type: object
      properties:
        faceswap_type:
          type: integer
          description: Faceswap type
        faceswap_quality:
          type: integer
          description: Faceswap quality level
        faceswap_status:
          type: integer
          enum: [1, 2, 3, 4]
          description: "Faceswap result status: 1 In Queue, 2 Processing, 3 Success, 4 Failed"
        deduction_status:
          type: integer
          description: Deduction status
        image:
          type: integer
          description: Image indicator
        video_duration:
          type: number
          description: Video duration in seconds
        deduction_duration:
          type: number
          description: Deduction duration
        update_time:
          type: number
          description: Update timestamp
        _id:
          type: string
          description: Result ID
        userId:
          type: string
          description: User ID
        uid:
          type: integer
          description: User unique ID
        url:
          type: string
          description: Faceswap result URL
        createdAt:
          type: string
          format: date-time
          description: Current faceswap action created time

    FaceswapResultList:
      type: object
      properties:
        result:
          type: array
          items:
            $ref: '#/components/schemas/FaceswapResultDetail'

    CreditInfo:
      type: object
      properties:
        credit:
          type: number
          description: Account balance
